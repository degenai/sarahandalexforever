name: gate

# Parse/sanity gate for bot PRs (Jules / Bolt / Palette / Sentinel) and human pushes.
# Its only job: refuse to go green if something doesn't parse, a test fails, or an
# SRI hash doesn't match the bytes the CDN actually serves.
# Deliberately NOT a style linter — empty stylelint rules, structural-only HTML.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  parse-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1) Every JS file must parse. Zero deps, instant.
      - name: JS parses (node --check)
        run: |
          files=$(git ls-files '*.js' '*.mjs' '*.cjs' | grep -vE '\.min\.js$|/vendor/|_deprecated/' || true)
          if [ -z "$files" ]; then echo "no js"; exit 0; fi
          for f in $files; do
            node --check "$f" || { echo "::error file=$f::JS syntax error"; exit 1; }
          done

      # 2) Unit tests, if any exist.
      - name: Unit tests (node --test)
        run: |
          files=$(git ls-files '*.test.js' '*.test.mjs' | grep -vE '_deprecated/' || true)
          if [ -n "$files" ]; then node --test $files; else echo "no tests"; fi

      # 3) Every CSS file must PARSE. Stops the orphan-brace class of bug.
      - name: CSS parses (stylelint)
        run: |
          files=$(git ls-files '*.css' | grep -vE '\.min\.css$|/vendor/|_deprecated/' || true)
          if [ -z "$files" ]; then echo "no css"; exit 0; fi
          npx --yes stylelint $files

      # 4) HTML must be structurally sound: closed tags, no duplicate ids/attrs.
      - name: HTML structure (html-validate)
        run: |
          files=$(git ls-files '*.html' | grep -vE '/vendor/|_deprecated/' || true)
          if [ -z "$files" ]; then echo "no html"; exit 0; fi
          npx --yes html-validate $files

      # 5) Every SRI integrity= hash must match the bytes the CDN serves.
      #    This is the check that would have caught PR #114's hallucinated GSAP hash
      #    (SRI fails closed: a wrong hash = the browser refuses the script).
      - name: SRI hashes match the CDN bytes
        run: node scripts/check-sri.mjs
