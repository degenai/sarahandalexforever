<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSVP · Sarah &amp; Alex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/shared.v2.css">
  <style>
    .content {
      position: relative; z-index: 10;
      max-width: 560px; margin: 0 auto;
      padding: 60px 28px 80px;
    }
    .rsvp-intro {
      text-align: center;
      font-size: 7px; line-height: 2.4;
      opacity: .6; letter-spacing: 1px;
      margin-bottom: 32px;
    }
  </style>
</head>
<body>
  <div id="sky"></div>

  <nav class="nav">
    <a href="../index.html">HOME</a>
    <a href="story.html">OUR STORY</a>
    <a href="details.html">DETAILS</a>
    <a href="gallery.html">GALLERY</a>
    <a href="rsvp.html" class="active" aria-current="page">RSVP</a>
    <a href="registry.html">REGISTRY</a>
  </nav>

  <div class="content">
    <div class="page-title">✦ RSVP ✦</div>

    <div class="rsvp-intro">
      We can't wait to celebrate with you.<br>
      Please reply below.
    </div>

    <form id="rsvp-form" class="form-card"
          action="https://formspree.io/f/mqejyqrv"
          method="POST">
      <div class="nail tl"></div><div class="nail tr"></div>
      <div class="nail bl"></div><div class="nail br"></div>

      <div class="card-header">✦ KINDLY REPLY ✦</div>

      <div class="pixel-field">
        <label class="pixel-label" for="rsvp-name">YOUR NAME <span class="req">*</span></label>
        <input class="pixel-input" id="rsvp-name" name="name" type="text" placeholder="JANE & JOHN DOE" required autocomplete="name">
      </div>

      <div class="pixel-field">
        <label class="pixel-label" for="rsvp-email">EMAIL <span class="req">*</span></label>
        <input class="pixel-input" id="rsvp-email" name="email" type="email" placeholder="YOU@EXAMPLE.COM" required autocomplete="email">
      </div>

      <div class="pixel-field">
        <label class="pixel-label">WILL YOU ATTEND? <span class="req">*</span></label>
        <div class="yn-toggle" data-toggle="rsvp-attending">
          <button type="button" class="yn-btn yes" data-val="yes">JOYFULLY<br>ATTENDING</button>
          <button type="button" class="yn-btn no" data-val="no">REGRETFULLY<br>DECLINING</button>
        </div>
        <input type="hidden" name="attending" id="rsvp-attending" required>
      </div>

      <div class="pixel-field">
        <label class="pixel-label" for="rsvp-party">PARTY SIZE (INCLUDING YOU)</label>
        <select class="pixel-select" id="rsvp-party" name="party_size">
          <option>1</option><option>2</option><option>3</option>
          <option>4</option><option>5</option><option>6+</option>
        </select>
      </div>

      <div class="pixel-field">
        <label class="pixel-label" for="rsvp-diet">DIETARY NOTES</label>
        <textarea class="pixel-textarea" id="rsvp-diet" name="dietary" placeholder="ALLERGIES, RESTRICTIONS, ETC."></textarea>
      </div>

      <div class="pixel-field">
        <label class="pixel-label" for="rsvp-song">SONG REQUEST</label>
        <input class="pixel-input" id="rsvp-song" name="song" type="text" placeholder="WHAT GETS YOU ON THE DANCE FLOOR?">
      </div>

      <div class="pixel-field">
        <label class="pixel-label" for="rsvp-note">NOTE TO THE COUPLE</label>
        <textarea class="pixel-textarea" id="rsvp-note" name="note" placeholder="SAY HI, LEAVE A WISH..."></textarea>
      </div>

      <div class="pixel-field">
        <label class="pixel-label" for="rsvp-addr">MAILING ADDRESS</label>
        <textarea class="pixel-textarea" id="rsvp-addr" name="address" placeholder="FOR THANK-YOU CARDS"></textarea>
      </div>

      <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;" aria-hidden="true">
      <input type="hidden" name="_subject" value="New RSVP from sarahandalexforever">

      <button class="pixel-submit" type="submit" id="rsvp-submit">SEND RSVP</button>

      <div id="rsvp-error" class="error-state" style="display:none">
        <div class="msg">Something went wrong. Please try again, or email us directly.</div>
      </div>
    </form>

    <div id="rsvp-success" class="form-card success-state" style="display:none">
      <div class="nail tl"></div><div class="nail tr"></div>
      <div class="nail bl"></div><div class="nail br"></div>
      <div class="check">♥</div>
      <div class="msg">RSVP SENT</div>
      <div class="sub">Thank you. We can't wait to see you.<br>See you March 6, 2027.</div>
    </div>
  </div>

  <footer class="footer">
    SARAH &amp; ALEX · MARCH 6, 2027<br>♥
  </footer>

  <script src="../assets/js/stars.js"></script>
  <script type="module">
    import { animate, stagger, createSpring } from 'https://cdn.jsdelivr.net/npm/animejs@4/+esm';

    // Entrance: stagger form fields and submit button in
    animate('#rsvp-form .pixel-field, #rsvp-form .pixel-submit', {
      opacity: [0, 1],
      y: [-10, 0],
      delay: stagger(45, { start: 120 }),
      duration: 500,
      ease: 'outQuad'
    });

    // Yes/No toggle with bounce on click
    document.querySelectorAll('.yn-toggle').forEach(function (toggle) {
      var hidden = document.getElementById(toggle.getAttribute('data-toggle'));
      toggle.querySelectorAll('.yn-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          toggle.querySelectorAll('.yn-btn').forEach(function (b) { b.classList.remove('active'); });
          btn.classList.add('active');
          if (hidden) hidden.value = btn.getAttribute('data-val');
          animate(btn, {
            scale: [1, 1.12, 1],
            duration: 340,
            ease: 'outQuad'
          });
        });
      });
    });

    // AJAX submit, keeps guests on the page, shows pixel-art success state
    var form    = document.getElementById('rsvp-form');
    var submit  = document.getElementById('rsvp-submit');
    var errorEl = document.getElementById('rsvp-error');
    var success = document.getElementById('rsvp-success');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      errorEl.style.display = 'none';

      if (!document.getElementById('rsvp-attending').value) {
        errorEl.querySelector('.msg').textContent = 'Please choose Attending or Declining.';
        errorEl.style.display = 'block';
        return;
      }

      submit.disabled = true;
      submit.textContent = 'SENDING...';

      fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      }).then(function (res) {
        if (res.ok) {
          form.style.display = 'none';
          success.style.display = 'block';
          animate('#rsvp-success', {
            scale: [0.85, 1],
            opacity: [0, 1],
            ease: createSpring({ mass: 1, stiffness: 110, damping: 13 }),
            duration: 700
          });
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
          throw new Error('Submit failed');
        }
      }).catch(function () {
        submit.disabled = false;
        submit.textContent = 'SEND RSVP';
        errorEl.querySelector('.msg').textContent = 'Something went wrong. Please try again, or email us directly.';
        errorEl.style.display = 'block';
      });
    });
  </script>
</body>
</html>
