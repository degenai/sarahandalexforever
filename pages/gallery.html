<!doctype html>

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery — Sarah &amp; Alex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/shared.css" />
    <style>
      .content {
        position: relative;
        z-index: 10;
        max-width: 800px;
        margin: 0 auto;
        padding: 60px 28px 80px;
      }

      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 48px;
      }

      .gallery-item {
        aspect-ratio: 1;
        border: 4px solid var(--wood-border);
        background: var(--wood-dark);
        box-shadow:
          inset 4px 4px 0 var(--wood-hi),
          inset -4px -4px 0 #0a0500;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: box-shadow 0.3s;
      }
      .gallery-item:hover {
        box-shadow:
          inset 4px 4px 0 var(--wood-hi),
          inset -4px -4px 0 #0a0500,
          0 0 20px var(--gold-glow);
      }
      .gallery-item span {
        font-size: 7px;
        opacity: 0.3;
        letter-spacing: 2px;
        text-align: center;
        line-height: 2;
      }

      .gallery-note {
        text-align: center;
        font-size: 7px;
        line-height: 2.4;
        opacity: 0.5;
        letter-spacing: 1px;
      }
    </style>
  </head>

        <div class="gallery-item"><span>[ photo ]</span></div>
        <div class="gallery-item"><span>[ photo ]</span></div>
        <div class="gallery-item"><span>[ photo ]</span></div>
        <div class="gallery-item"><span>[ photo ]</span></div>
        <div class="gallery-item"><span>[ photo ]</span></div>
      </div>

      <div class="gallery-note">More photos coming soon!</div>
    </div>

    <footer class="footer">SARAH &amp; ALEX · MARCH 6, 2027<br />♥</footer>

    <script src="../assets/js/stars.js"></script>
  </body>
</html>
