<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private — Sarah &amp; Alex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #07050f;
      font-family: 'Press Start 2P', monospace;
      display: flex; align-items: center; justify-content: center;
    }
    .msg {
      text-align: center;
      color: #f59e0b;
      font-size: 11px;
      line-height: 2.5;
      text-shadow: 3px 3px 0 #5a2800;
      padding: 20px;
    }
    .msg span {
      display: block;
      font-size: 7px;
      color: #fef3c7;
      opacity: .6;
      margin-top: 16px;
      letter-spacing: 2px;
    }
    a {
      color: #4ade80;
      font-size: 7px;
      text-decoration: none;
      opacity: .6;
      letter-spacing: 2px;
    }
    a:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="msg">
    🏮 PRIVATE PORTAL<br>
    COMING SOON
    <span>password-protected planning space<br>for alex, sarah &amp; the wedding planner</span>
    <br><br>
    <a href="../">← back to main</a>
  </div>
</body>
</html>
